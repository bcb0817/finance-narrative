name: market-map-post

on:
  # schedule:  # ローカル運用へ移行済み（local_finance_bot.py daemon）
    # - cron: "35 13 * * 1-5"   # 平日 13:35 UTC ≒ 9:35 ET(夏時間)。冬時間は 14:35 UTC に要変更
  workflow_dispatch:            # 手動実行ボタン(検証用)

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: Run market map
        env:
          # 左側 = post_to_x.py が読む名前 / 右側 = リポジトリに登録済みのSecret名
          X_API_KEY: ${{ secrets.API_KEY }}
          X_API_SECRET: ${{ secrets.API_KEY_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.ACCESS_TOKEN_SECRET }}
          PYTHONPATH: src
        run: python -m market_map.run_market_map
