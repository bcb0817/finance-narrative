name: X Finance Auto Post Bot

on:
  schedule:
    - cron: '12 20 * * *'  # JST 05:12
    - cron: '29 20 * * *'  # JST 05:29
    - cron: '55 20 * * *'  # JST 05:55
    - cron: '22 21 * * *'  # JST 06:22
    - cron: '35 21 * * *'  # JST 06:35
    - cron: '47 21 * * *'  # JST 06:47
    - cron: '22 22 * * *'  # JST 07:22
    - cron: '41 22 * * *'  # JST 07:41
    - cron: '55 22 * * *'  # JST 07:55
    - cron: '17 23 * * *'  # JST 08:17
    - cron: '33 23 * * *'  # JST 08:33
    - cron: '45 23 * * *'  # JST 08:45
    - cron: '57 23 * * *'  # JST 08:57
    - cron: '8 2 * * *'  # JST 11:08
    - cron: '27 2 * * *'  # JST 11:27
    - cron: '44 2 * * *'  # JST 11:44
    - cron: '57 2 * * *'  # JST 11:57
    - cron: '11 3 * * *'  # JST 12:11
    - cron: '36 3 * * *'  # JST 12:36
    - cron: '53 3 * * *'  # JST 12:53
    - cron: '9 8 * * *'  # JST 17:09
    - cron: '26 8 * * *'  # JST 17:26
    - cron: '44 8 * * *'  # JST 17:44
    - cron: '12 9 * * *'  # JST 18:12
    - cron: '27 9 * * *'  # JST 18:27
    - cron: '46 9 * * *'  # JST 18:46
    - cron: '5 10 * * *'  # JST 19:05
    - cron: '17 10 * * *'  # JST 19:17
    - cron: '29 10 * * *'  # JST 19:29
    - cron: '45 10 * * *'  # JST 19:45
    - cron: '9 11 * * *'  # JST 20:09
    - cron: '29 11 * * *'  # JST 20:29
    - cron: '46 11 * * *'  # JST 20:46
    - cron: '16 12 * * *'  # JST 21:16
    - cron: '36 12 * * *'  # JST 21:36
    - cron: '48 12 * * *'  # JST 21:48
    - cron: '6 13 * * *'  # JST 22:06
    - cron: '22 13 * * *'  # JST 22:22
    - cron: '35 13 * * *'  # JST 22:35
    - cron: '55 13 * * *'  # JST 22:55
  workflow_dispatch:
    inputs:
      mode:
        description: '投稿モード（link / normal / diagram / test）'
        required: false
        default: 'test'

concurrency:
  group: x-finance-auto-post-bot
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine post mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(TZ=Asia/Tokyo date +%H)
            if [ "$HOUR" = "04" ] || [ "$HOUR" = "06" ] || [ "$HOUR" = "11" ] || [ "$HOUR" = "17" ]; then
              echo "mode=link" >> $GITHUB_OUTPUT
            else
              RAND=$((RANDOM % 2))
              if [ "$RAND" = "0" ]; then
                echo "mode=normal" >> $GITHUB_OUTPUT
              else
                echo "mode=diagram" >> $GITHUB_OUTPUT
              fi
            fi
          fi

      - name: Post to X
        env:
          API_KEY: ${{ secrets.API_KEY }}
          API_KEY_SECRET: ${{ secrets.API_KEY_SECRET }}
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          ACCESS_TOKEN_SECRET: ${{ secrets.ACCESS_TOKEN_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd src
          python post.py ${{ steps.mode.outputs.mode }}
