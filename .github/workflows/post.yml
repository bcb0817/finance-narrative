name: X Finance Auto Post Bot

on:
  schedule:
    - cron: '42 19 * * *'  # JST 04:42
    - cron: '5 20 * * *'  # JST 05:05
    - cron: '48 20 * * *'  # JST 05:48
    - cron: '11 21 * * *'  # JST 06:11
    - cron: '28 21 * * *'  # JST 06:28
    - cron: '40 21 * * *'  # JST 06:40
    - cron: '55 21 * * *'  # JST 06:55
    - cron: '13 22 * * *'  # JST 07:13
    - cron: '38 22 * * *'  # JST 07:38
    - cron: '55 22 * * *'  # JST 07:55
    - cron: '19 23 * * *'  # JST 08:19
    - cron: '37 23 * * *'  # JST 08:37
    - cron: '55 23 * * *'  # JST 08:55
    - cron: '10 2 * * *'  # JST 11:10
    - cron: '22 2 * * *'  # JST 11:22
    - cron: '34 2 * * *'  # JST 11:34
    - cron: '57 2 * * *'  # JST 11:57
    - cron: '9 3 * * *'  # JST 12:09
    - cron: '30 3 * * *'  # JST 12:30
    - cron: '48 3 * * *'  # JST 12:48
    - cron: '10 8 * * *'  # JST 17:10
    - cron: '23 8 * * *'  # JST 17:23
    - cron: '46 8 * * *'  # JST 17:46
    - cron: '6 9 * * *'  # JST 18:06
    - cron: '29 9 * * *'  # JST 18:29
    - cron: '46 9 * * *'  # JST 18:46
    - cron: '8 10 * * *'  # JST 19:08
    - cron: '23 10 * * *'  # JST 19:23
    - cron: '41 10 * * *'  # JST 19:41
    - cron: '7 11 * * *'  # JST 20:07
    - cron: '27 11 * * *'  # JST 20:27
    - cron: '49 11 * * *'  # JST 20:49
    - cron: '16 12 * * *'  # JST 21:16
    - cron: '29 12 * * *'  # JST 21:29
    - cron: '52 12 * * *'  # JST 21:52
    - cron: '14 13 * * *'  # JST 22:14
    - cron: '26 13 * * *'  # JST 22:26
    - cron: '45 13 * * *'  # JST 22:45
    - cron: '57 13 * * *'  # JST 22:57
  workflow_dispatch:
    inputs:
      mode:
        description: '投稿モード（link / normal / diagram / test）'
        required: false
        default: 'test'

concurrency:
  group: x-finance-auto-post-bot
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine post mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(TZ=Asia/Tokyo date +%H)
            if [ "$HOUR" = "04" ] || [ "$HOUR" = "06" ] || [ "$HOUR" = "11" ] || [ "$HOUR" = "17" ]; then
              echo "mode=link" >> $GITHUB_OUTPUT
            else
              RAND=$((RANDOM % 2))
              if [ "$RAND" = "0" ]; then
                echo "mode=normal" >> $GITHUB_OUTPUT
              else
                echo "mode=diagram" >> $GITHUB_OUTPUT
              fi
            fi
          fi

      - name: Post to X
        env:
          API_KEY: ${{ secrets.API_KEY }}
          API_KEY_SECRET: ${{ secrets.API_KEY_SECRET }}
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          ACCESS_TOKEN_SECRET: ${{ secrets.ACCESS_TOKEN_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd src
          python post.py ${{ steps.mode.outputs.mode }}
