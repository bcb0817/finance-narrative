name: X Finance Auto Post Bot

on:
  schedule:
    - cron: '41 19 * * *'  # JST 04:41
    - cron: '30 20 * * *'  # JST 05:30
    - cron: '43 20 * * *'  # JST 05:43
    - cron: '11 21 * * *'  # JST 06:11
    - cron: '28 21 * * *'  # JST 06:28
    - cron: '45 21 * * *'  # JST 06:45
    - cron: '5 22 * * *'  # JST 07:05
    - cron: '31 22 * * *'  # JST 07:31
    - cron: '44 22 * * *'  # JST 07:44
    - cron: '13 23 * * *'  # JST 08:13
    - cron: '28 23 * * *'  # JST 08:28
    - cron: '43 23 * * *'  # JST 08:43
    - cron: '6 2 * * *'  # JST 11:06
    - cron: '33 2 * * *'  # JST 11:33
    - cron: '54 2 * * *'  # JST 11:54
    - cron: '15 3 * * *'  # JST 12:15
    - cron: '38 3 * * *'  # JST 12:38
    - cron: '57 3 * * *'  # JST 12:57
    - cron: '9 8 * * *'  # JST 17:09
    - cron: '23 8 * * *'  # JST 17:23
    - cron: '38 8 * * *'  # JST 17:38
    - cron: '57 8 * * *'  # JST 17:57
    - cron: '25 9 * * *'  # JST 18:25
    - cron: '43 9 * * *'  # JST 18:43
    - cron: '8 10 * * *'  # JST 19:08
    - cron: '20 10 * * *'  # JST 19:20
    - cron: '49 10 * * *'  # JST 19:49
    - cron: '16 11 * * *'  # JST 20:16
    - cron: '45 11 * * *'  # JST 20:45
    - cron: '8 12 * * *'  # JST 21:08
    - cron: '28 12 * * *'  # JST 21:28
    - cron: '41 12 * * *'  # JST 21:41
    - cron: '57 12 * * *'  # JST 21:57
    - cron: '13 13 * * *'  # JST 22:13
    - cron: '33 13 * * *'  # JST 22:33
    - cron: '45 13 * * *'  # JST 22:45
  workflow_dispatch:
    inputs:
      mode:
        description: '投稿モード（link / normal / diagram / test）'
        required: false
        default: 'test'

concurrency:
  group: x-finance-auto-post-bot
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine post mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(TZ=Asia/Tokyo date +%H)
            if [ "$HOUR" = "04" ] || [ "$HOUR" = "06" ] || [ "$HOUR" = "11" ] || [ "$HOUR" = "17" ]; then
              echo "mode=link" >> $GITHUB_OUTPUT
            else
              RAND=$((RANDOM % 2))
              if [ "$RAND" = "0" ]; then
                echo "mode=normal" >> $GITHUB_OUTPUT
              else
                echo "mode=diagram" >> $GITHUB_OUTPUT
              fi
            fi
          fi

      - name: Post to X
        env:
          API_KEY: ${{ secrets.API_KEY }}
          API_KEY_SECRET: ${{ secrets.API_KEY_SECRET }}
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          ACCESS_TOKEN_SECRET: ${{ secrets.ACCESS_TOKEN_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd src
          python post.py ${{ steps.mode.outputs.mode }}
