name: X Finance Auto Post Bot
# resync 2026-06-20
# schedule の cron は GitHub Actions 仕様により UTC。
# コメントの JST は実際の日本時間での実行目安。
# このファイルは毎日 0:00 JST に reset.yml が自動更新します。

on:
  schedule:
    - cron: '45 19 * * *'  # JST 04:45
    - cron: '29 20 * * *'  # JST 05:29
    - cron: '53 20 * * *'  # JST 05:53
    - cron: '10 21 * * *'  # JST 06:10
    - cron: '33 21 * * *'  # JST 06:33
    - cron: '56 21 * * *'  # JST 06:56
    - cron: '8 22 * * *'  # JST 07:08
    - cron: '28 22 * * *'  # JST 07:28
    - cron: '48 22 * * *'  # JST 07:48
    - cron: '6 23 * * *'  # JST 08:06
    - cron: '19 23 * * *'  # JST 08:19
    - cron: '31 23 * * *'  # JST 08:31
    - cron: '46 23 * * *'  # JST 08:46
    - cron: '5 2 * * *'  # JST 11:05
    - cron: '18 2 * * *'  # JST 11:18
    - cron: '30 2 * * *'  # JST 11:30
    - cron: '56 2 * * *'  # JST 11:56
    - cron: '11 3 * * *'  # JST 12:11
    - cron: '31 3 * * *'  # JST 12:31
    - cron: '44 3 * * *'  # JST 12:44
    - cron: '10 8 * * *'  # JST 17:10
    - cron: '33 8 * * *'  # JST 17:33
    - cron: '49 8 * * *'  # JST 17:49
    - cron: '17 9 * * *'  # JST 18:17
    - cron: '35 9 * * *'  # JST 18:35
    - cron: '47 9 * * *'  # JST 18:47
    - cron: '15 10 * * *'  # JST 19:15
    - cron: '28 10 * * *'  # JST 19:28
    - cron: '45 10 * * *'  # JST 19:45
    - cron: '5 11 * * *'  # JST 20:05
    - cron: '19 11 * * *'  # JST 20:19
    - cron: '35 11 * * *'  # JST 20:35
    - cron: '52 11 * * *'  # JST 20:52
    - cron: '16 12 * * *'  # JST 21:16
    - cron: '33 12 * * *'  # JST 21:33
    - cron: '57 12 * * *'  # JST 21:57
    - cron: '25 13 * * *'  # JST 22:25
    - cron: '49 13 * * *'  # JST 22:49
  workflow_dispatch:
    inputs:
      mode:
        description: '投稿モード（link / normal / diagram / test）'
        required: false
        default: 'diagram'

concurrency:
  group: x-finance-auto-post-bot
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine post mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          else
            RAND=$((RANDOM % 2))
            if [ "$RAND" = "0" ]; then
              echo "mode=link" >> $GITHUB_OUTPUT
            else
              echo "mode=diagram" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Post to X
        id: post
        env:
          API_KEY: ${{ secrets.API_KEY }}
          API_KEY_SECRET: ${{ secrets.API_KEY_SECRET }}
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          ACCESS_TOKEN_SECRET: ${{ secrets.ACCESS_TOKEN_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python src/post.py ${{ steps.mode.outputs.mode }}

      - name: Commit posted history
        if: success() && steps.mode.outputs.mode != 'test'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/posted_history.json
          git diff --staged --quiet || git commit -m "Update posted history"
          git push
