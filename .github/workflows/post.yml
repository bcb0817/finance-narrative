name: X Finance Auto Post Bot

on:
  schedule:
    - cron: '39 19 * * *'
    - cron: '9 20 * * *'
    - cron: '33 20 * * *'
    - cron: '14 21 * * *'
    - cron: '28 21 * * *'
    - cron: '58 21 * * *'
    - cron: '7 22 * * *'
    - cron: '3 23 * * *'
    - cron: '8 23 * * *'
    - cron: '32 23 * * *'
    - cron: '41 23 * * *'
    - cron: '53 23 * * *'
    - cron: '58 23 * * *'
    - cron: '22 2 * * *'
    - cron: '41 2 * * *'
    - cron: '10 3 * * *'
    - cron: '28 3 * * *'
    - cron: '37 3 * * *'
    - cron: '50 3 * * *'
    - cron: '58 3 * * *'
    - cron: '12 8 * * *'
    - cron: '32 8 * * *'
    - cron: '39 8 * * *'
    - cron: '0 9 * * *'
    - cron: '32 9 * * *'
    - cron: '44 9 * * *'
    - cron: '57 9 * * *'
    - cron: '5 10 * * *'
    - cron: '13 10 * * *'
    - cron: '58 10 * * *'
    - cron: '3 11 * * *'
    - cron: '20 11 * * *'
    - cron: '41 11 * * *'
    - cron: '26 12 * * *'
    - cron: '41 12 * * *'
    - cron: '52 12 * * *'
    - cron: '11 13 * * *'
    - cron: '35 13 * * *'
    - cron: '40 13 * * *'
    - cron: '59 13 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: '投稿モード（link / normal / diagram / test）'
        required: false
        default: 'test'

jobs:
  post:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine post mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(date -u +%H)
            if [ "$HOUR" = "19" ] || [ "$HOUR" = "21" ] || [ "$HOUR" = "02" ] || [ "$HOUR" = "08" ]; then
              echo "mode=link" >> $GITHUB_OUTPUT
            else
              RAND=$((RANDOM % 2))
              if [ "$RAND" = "0" ]; then
                echo "mode=normal" >> $GITHUB_OUTPUT
              else
                echo "mode=diagram" >> $GITHUB_OUTPUT
              fi
            fi
          fi

      - name: Post to X
        env:
          API_KEY: ${{ secrets.API_KEY }}
          API_KEY_SECRET: ${{ secrets.API_KEY_SECRET }}
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          ACCESS_TOKEN_SECRET: ${{ secrets.ACCESS_TOKEN_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd src
          python post.py ${{ steps.mode.outputs.mode }}
