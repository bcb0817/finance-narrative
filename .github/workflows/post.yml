name: X Finance Auto Post Bot

on:
  schedule:
    - cron: '43 19 * * *'
    - cron: '53 19 * * *'
    - cron: '19 20 * * *'
    - cron: '36 20 * * *'
    - cron: '13 21 * * *'
    - cron: '27 21 * * *'
    - cron: '39 21 * * *'
    - cron: '59 21 * * *'
    - cron: '7 22 * * *'
    - cron: '17 22 * * *'
    - cron: '23 22 * * *'
    - cron: '41 22 * * *'
    - cron: '49 22 * * *'
    - cron: '56 22 * * *'
    - cron: '19 23 * * *'
    - cron: '36 23 * * *'
    - cron: '5 2 * * *'
    - cron: '14 2 * * *'
    - cron: '19 2 * * *'
    - cron: '24 2 * * *'
    - cron: '29 2 * * *'
    - cron: '36 2 * * *'
    - cron: '18 3 * * *'
    - cron: '45 3 * * *'
    - cron: '53 3 * * *'
    - cron: '7 8 * * *'
    - cron: '26 8 * * *'
    - cron: '33 8 * * *'
    - cron: '53 8 * * *'
    - cron: '3 9 * * *'
    - cron: '12 9 * * *'
    - cron: '18 9 * * *'
    - cron: '38 9 * * *'
    - cron: '38 10 * * *'
    - cron: '55 10 * * *'
    - cron: '4 11 * * *'
    - cron: '22 11 * * *'
    - cron: '29 11 * * *'
    - cron: '35 11 * * *'
    - cron: '45 11 * * *'
    - cron: '56 11 * * *'
    - cron: '8 12 * * *'
    - cron: '17 12 * * *'
    - cron: '25 12 * * *'
    - cron: '41 12 * * *'
    - cron: '51 12 * * *'
    - cron: '17 13 * * *'
    - cron: '39 13 * * *'
    - cron: '58 13 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: '投稿モード（link / normal / diagram / test）'
        required: false
        default: 'test'

jobs:
  post:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine post mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(date -u +%H)
            if [ "$HOUR" = "19" ] || [ "$HOUR" = "21" ] || [ "$HOUR" = "02" ] || [ "$HOUR" = "08" ]; then
              echo "mode=link" >> $GITHUB_OUTPUT
            else
              RAND=$((RANDOM % 2))
              if [ "$RAND" = "0" ]; then
                echo "mode=normal" >> $GITHUB_OUTPUT
              else
                echo "mode=diagram" >> $GITHUB_OUTPUT
              fi
            fi
          fi

      - name: Post to X
        env:
          API_KEY: ${{ secrets.API_KEY }}
          API_KEY_SECRET: ${{ secrets.API_KEY_SECRET }}
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          ACCESS_TOKEN_SECRET: ${{ secrets.ACCESS_TOKEN_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd src
          python post.py ${{ steps.mode.outputs.mode }}
