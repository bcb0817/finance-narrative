name: X Finance Auto Post Bot

# schedule の cron は GitHub Actions 仕様により UTC。
# コメントの JST は実際の日本時間での実行目安。
# このファイルは毎日 0:00 JST に reset.yml が自動更新します。

on:
  schedule:
    - cron: '48 19 * * *'  # JST 04:48
    - cron: '38 20 * * *'  # JST 05:38
    - cron: '53 20 * * *'  # JST 05:53
    - cron: '10 21 * * *'  # JST 06:10
    - cron: '25 21 * * *'  # JST 06:25
    - cron: '38 21 * * *'  # JST 06:38
    - cron: '56 21 * * *'  # JST 06:56
    - cron: '15 22 * * *'  # JST 07:15
    - cron: '36 22 * * *'  # JST 07:36
    - cron: '54 22 * * *'  # JST 07:54
    - cron: '8 23 * * *'  # JST 08:08
    - cron: '26 23 * * *'  # JST 08:26
    - cron: '49 23 * * *'  # JST 08:49
    - cron: '9 2 * * *'  # JST 11:09
    - cron: '34 2 * * *'  # JST 11:34
    - cron: '50 2 * * *'  # JST 11:50
    - cron: '10 3 * * *'  # JST 12:10
    - cron: '24 3 * * *'  # JST 12:24
    - cron: '42 3 * * *'  # JST 12:42
    - cron: '54 3 * * *'  # JST 12:54
    - cron: '13 8 * * *'  # JST 17:13
    - cron: '30 8 * * *'  # JST 17:30
    - cron: '44 8 * * *'  # JST 17:44
    - cron: '6 9 * * *'  # JST 18:06
    - cron: '27 9 * * *'  # JST 18:27
    - cron: '43 9 * * *'  # JST 18:43
    - cron: '55 9 * * *'  # JST 18:55
    - cron: '18 10 * * *'  # JST 19:18
    - cron: '32 10 * * *'  # JST 19:32
    - cron: '51 10 * * *'  # JST 19:51
    - cron: '5 11 * * *'  # JST 20:05
    - cron: '37 11 * * *'  # JST 20:37
    - cron: '52 11 * * *'  # JST 20:52
    - cron: '11 12 * * *'  # JST 21:11
    - cron: '23 12 * * *'  # JST 21:23
    - cron: '38 12 * * *'  # JST 21:38
    - cron: '51 12 * * *'  # JST 21:51
    - cron: '8 13 * * *'  # JST 22:08
    - cron: '31 13 * * *'  # JST 22:31
    - cron: '52 13 * * *'  # JST 22:52
  workflow_dispatch:
    inputs:
      mode:
        description: '投稿モード（diagram / image / dry-run）'
        required: false
        default: 'image'

concurrency:
  group: x-finance-auto-post-bot
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Japanese fonts
        run: sudo apt-get update && sudo apt-get install -y fonts-noto-cjk

      - name: Debug time info
        run: |
          echo "UTC now : $(date -u '+%Y-%m-%d %H:%M:%S')"
          echo "JST now : $(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M:%S')"
          echo "Event   : ${{ github.event_name }}"
          echo "SHA     : ${{ github.sha }}"

      - name: Determine post mode
        id: mode
        run: |
          JST_H=$(TZ=Asia/Tokyo date +%H)
          JST_M=$(TZ=Asia/Tokyo date +%M)
          MIN=$((10#$JST_H * 60 + 10#$JST_M))
          if [ "$MIN" -lt 270 ] && [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            echo "深夜帯（JST $JST_H:$JST_M）のため投稿スキップ"
            echo "mode=skip" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          else
            # image と diagram を 50/50 でランダム振り分け
            if [ $((RANDOM % 2)) -eq 0 ]; then
              echo "mode=image" >> $GITHUB_OUTPUT
            else
              echo "mode=diagram" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Post to X
        id: post
        if: steps.mode.outputs.mode != 'skip'
        env:
          API_KEY: ${{ secrets.API_KEY }}
          API_KEY_SECRET: ${{ secrets.API_KEY_SECRET }}
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          ACCESS_TOKEN_SECRET: ${{ secrets.ACCESS_TOKEN_SECRET }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          cd src
          python post.py "${{ steps.mode.outputs.mode }}"

      - name: Commit posted history
        if: success() && steps.mode.outputs.mode != 'skip' && steps.mode.outputs.mode != 'dry-run'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/posted_history.json
          git diff --staged --quiet || git commit -m "Update posted history"
          git push
