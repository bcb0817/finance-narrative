name: X Finance Auto Post Bot

# 30分間隔・1日48回の固定スケジュール（UTC）。深夜含む24時間。
# AI審査（assess_market_impact）で市場影響が小さいものは投稿せずスキップする。

on:
  # schedule:  # ローカル運用へ移行済み（local_finance_bot.py daemon）
    # - cron: '0 0 * * *'  # JST 09:00
    # - cron: '30 0 * * *'  # JST 09:30
    # - cron: '0 1 * * *'  # JST 10:00
    # - cron: '30 1 * * *'  # JST 10:30
    # - cron: '0 2 * * *'  # JST 11:00
    # - cron: '30 2 * * *'  # JST 11:30
    # - cron: '0 3 * * *'  # JST 12:00
    # - cron: '30 3 * * *'  # JST 12:30
    # - cron: '0 4 * * *'  # JST 13:00
    # - cron: '30 4 * * *'  # JST 13:30
    # - cron: '0 5 * * *'  # JST 14:00
    # - cron: '30 5 * * *'  # JST 14:30
    # - cron: '0 6 * * *'  # JST 15:00
    # - cron: '30 6 * * *'  # JST 15:30
    # - cron: '0 7 * * *'  # JST 16:00
    # - cron: '30 7 * * *'  # JST 16:30
    # - cron: '0 8 * * *'  # JST 17:00
    # - cron: '30 8 * * *'  # JST 17:30
    # - cron: '0 9 * * *'  # JST 18:00
    # - cron: '30 9 * * *'  # JST 18:30
    # - cron: '0 10 * * *'  # JST 19:00
    # - cron: '30 10 * * *'  # JST 19:30
    # - cron: '0 11 * * *'  # JST 20:00
    # - cron: '30 11 * * *'  # JST 20:30
    # - cron: '0 12 * * *'  # JST 21:00
    # - cron: '30 12 * * *'  # JST 21:30
    # - cron: '0 13 * * *'  # JST 22:00
    # - cron: '30 13 * * *'  # JST 22:30
    # - cron: '0 14 * * *'  # JST 23:00
    # - cron: '30 14 * * *'  # JST 23:30
    # - cron: '0 15 * * *'  # JST 00:00
    # - cron: '30 15 * * *'  # JST 00:30
    # - cron: '0 16 * * *'  # JST 01:00
    # - cron: '30 16 * * *'  # JST 01:30
    # - cron: '0 17 * * *'  # JST 02:00
    # - cron: '30 17 * * *'  # JST 02:30
    # - cron: '0 18 * * *'  # JST 03:00
    # - cron: '30 18 * * *'  # JST 03:30
    # - cron: '0 19 * * *'  # JST 04:00
    # - cron: '30 19 * * *'  # JST 04:30
    # - cron: '0 20 * * *'  # JST 05:00
    # - cron: '30 20 * * *'  # JST 05:30
    # - cron: '0 21 * * *'  # JST 06:00
    # - cron: '30 21 * * *'  # JST 06:30
    # - cron: '0 22 * * *'  # JST 07:00
    # - cron: '30 22 * * *'  # JST 07:30
    # - cron: '0 23 * * *'  # JST 08:00
    # - cron: '30 23 * * *'  # JST 08:30
  workflow_dispatch:
    inputs:
      mode:
        description: '投稿モード（image / diagram）'
        required: false
        default: 'image'
        type: choice
        options:
          - image
          - diagram

concurrency:
  group: x-finance-auto-post-bot
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Japanese fonts
        run: sudo apt-get update && sudo apt-get install -y fonts-noto-cjk

      - name: Determine post mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          else
            # image と diagram を 50/50 でランダム振り分け
            if [ $((RANDOM % 2)) -eq 0 ]; then
              echo "mode=image" >> $GITHUB_OUTPUT
            else
              echo "mode=diagram" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Post to X
        id: post
        env:
          API_KEY: ${{ secrets.API_KEY }}
          API_KEY_SECRET: ${{ secrets.API_KEY_SECRET }}
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          ACCESS_TOKEN_SECRET: ${{ secrets.ACCESS_TOKEN_SECRET }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          cd src
          python news_bot/post.py "${{ steps.mode.outputs.mode }}"

      - name: Commit posted history
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/posted_history.json
          # 変更が無ければ何もしない
          if git diff --staged --quiet; then
            echo "no changes to posted_history.json"
            exit 0
          fi
          git commit -m "Update posted history"
          # push 失敗（他runの並行更新で reject 等）に備え、rebase pull + 最大3回リトライ
          for i in 1 2 3; do
            git pull --rebase origin main || true
            if git push origin HEAD:main; then
              echo "pushed on attempt $i"
              exit 0
            fi
            echo "push attempt $i failed; retrying in 10s..."
            sleep 10
          done
          echo "push failed after 3 attempts (投稿自体は成功している場合あり)"
          exit 1
