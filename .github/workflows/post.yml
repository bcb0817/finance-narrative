name: X Finance Auto Post Bot

on:
  schedule:
    - cron: '44 19 * * *'
    - cron: '22 20 * * *'
    - cron: '48 20 * * *'
    - cron: '58 20 * * *'
    - cron: '4 21 * * *'
    - cron: '11 21 * * *'
    - cron: '32 21 * * *'
    - cron: '51 21 * * *'
    - cron: '17 22 * * *'
    - cron: '26 22 * * *'
    - cron: '48 22 * * *'
    - cron: '58 22 * * *'
    - cron: '6 23 * * *'
    - cron: '25 23 * * *'
    - cron: '44 23 * * *'
    - cron: '50 23 * * *'
    - cron: '5 2 * * *'
    - cron: '19 2 * * *'
    - cron: '28 2 * * *'
    - cron: '36 2 * * *'
    - cron: '57 2 * * *'
    - cron: '10 3 * * *'
    - cron: '16 3 * * *'
    - cron: '52 3 * * *'
    - cron: '22 8 * * *'
    - cron: '27 8 * * *'
    - cron: '46 8 * * *'
    - cron: '51 8 * * *'
    - cron: '6 9 * * *'
    - cron: '11 9 * * *'
    - cron: '43 9 * * *'
    - cron: '58 9 * * *'
    - cron: '10 10 * * *'
    - cron: '18 10 * * *'
    - cron: '30 10 * * *'
    - cron: '35 10 * * *'
    - cron: '47 10 * * *'
    - cron: '12 11 * * *'
    - cron: '23 11 * * *'
    - cron: '33 11 * * *'
    - cron: '2 12 * * *'
    - cron: '31 12 * * *'
    - cron: '55 12 * * *'
    - cron: '4 13 * * *'
    - cron: '9 13 * * *'
    - cron: '20 13 * * *'
    - cron: '27 13 * * *'
    - cron: '48 13 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: '投稿モード（link / normal / test）'
        required: false
        default: 'test'

jobs:
  post:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine post mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(date -u +%H)
            if [ "$HOUR" = "19" ] || [ "$HOUR" = "21" ] || [ "$HOUR" = "02" ] || [ "$HOUR" = "08" ]; then
              echo "mode=link" >> $GITHUB_OUTPUT
            else
              echo "mode=normal" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Post to X
        env:
          API_KEY: ${{ secrets.API_KEY }}
          API_KEY_SECRET: ${{ secrets.API_KEY_SECRET }}
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          ACCESS_TOKEN_SECRET: ${{ secrets.ACCESS_TOKEN_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd src
          python post.py ${{ steps.mode.outputs.mode }}
