name: X Finance Auto Post Bot

on:
  schedule:
    - cron: '45 19 * * *'  # JST 04:45
    - cron: '25 20 * * *'  # JST 05:25
    - cron: '37 20 * * *'  # JST 05:37
    - cron: '13 21 * * *'  # JST 06:13
    - cron: '28 21 * * *'  # JST 06:28
    - cron: '43 21 * * *'  # JST 06:43
    - cron: '57 21 * * *'  # JST 06:57
    - cron: '10 22 * * *'  # JST 07:10
    - cron: '26 22 * * *'  # JST 07:26
    - cron: '49 22 * * *'  # JST 07:49
    - cron: '16 23 * * *'  # JST 08:16
    - cron: '43 23 * * *'  # JST 08:43
    - cron: '55 23 * * *'  # JST 08:55
    - cron: '9 2 * * *'  # JST 11:09
    - cron: '21 2 * * *'  # JST 11:21
    - cron: '35 2 * * *'  # JST 11:35
    - cron: '49 2 * * *'  # JST 11:49
    - cron: '23 3 * * *'  # JST 12:23
    - cron: '41 3 * * *'  # JST 12:41
    - cron: '56 3 * * *'  # JST 12:56
    - cron: '14 8 * * *'  # JST 17:14
    - cron: '31 8 * * *'  # JST 17:31
    - cron: '43 8 * * *'  # JST 17:43
    - cron: '7 9 * * *'  # JST 18:07
    - cron: '20 9 * * *'  # JST 18:20
    - cron: '35 9 * * *'  # JST 18:35
    - cron: '50 9 * * *'  # JST 18:50
    - cron: '7 10 * * *'  # JST 19:07
    - cron: '31 10 * * *'  # JST 19:31
    - cron: '54 10 * * *'  # JST 19:54
    - cron: '18 11 * * *'  # JST 20:18
    - cron: '35 11 * * *'  # JST 20:35
    - cron: '5 12 * * *'  # JST 21:05
    - cron: '27 12 * * *'  # JST 21:27
    - cron: '44 12 * * *'  # JST 21:44
    - cron: '26 13 * * *'  # JST 22:26
    - cron: '41 13 * * *'  # JST 22:41
    - cron: '55 13 * * *'  # JST 22:55
  workflow_dispatch:
    inputs:
      mode:
        description: '投稿モード（link / normal / diagram / test）'
        required: false
        default: 'test'

concurrency:
  group: x-finance-auto-post-bot
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine post mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(TZ=Asia/Tokyo date +%H)
            if [ "$HOUR" = "04" ] || [ "$HOUR" = "06" ] || [ "$HOUR" = "11" ] || [ "$HOUR" = "17" ]; then
              echo "mode=link" >> $GITHUB_OUTPUT
            else
              RAND=$((RANDOM % 2))
              if [ "$RAND" = "0" ]; then
                echo "mode=normal" >> $GITHUB_OUTPUT
              else
                echo "mode=diagram" >> $GITHUB_OUTPUT
              fi
            fi
          fi

      - name: Post to X
        env:
          API_KEY: ${{ secrets.API_KEY }}
          API_KEY_SECRET: ${{ secrets.API_KEY_SECRET }}
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          ACCESS_TOKEN_SECRET: ${{ secrets.ACCESS_TOKEN_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd src
          python post.py ${{ steps.mode.outputs.mode }}
