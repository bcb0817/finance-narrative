ナラティブのワークフロー（`narrative.yml`）の全文です。

```yaml
name: Market Narrative

# cron は UTC 固定（GitHub Actions 仕様）。米国市場の夏時間(EDT)基準。
# 冬時間(EST)期間は実際の市場時刻より1時間早く動く点に留意。
on:
  schedule:
    - cron: '30 12 * * 1-5'   # UTC 12:30 = 米オープン1時間前（夏時間 8:30 ET）
    - cron: '30 13 * * 1-5'   # UTC 13:30 = 米オープン直後（夏時間 9:30 ET）
    - cron: '0 20 * * 1-5'    # UTC 20:00 = 米クローズ直後（夏時間 16:00 ET）
  workflow_dispatch:
    inputs:
      action:
        description: 'image=画像のみ / post=実投稿'
        required: false
        default: 'image'

concurrency:
  group: market-narrative
  cancel-in-progress: false

jobs:
  narrative:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Install Japanese fonts
        run: sudo apt-get update && sudo apt-get install -y fonts-noto-cjk
      - name: Run narrative bot
        env:
          API_KEY: ${{ secrets.API_KEY }}
          API_KEY_SECRET: ${{ secrets.API_KEY_SECRET }}
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          ACCESS_TOKEN_SECRET: ${{ secrets.ACCESS_TOKEN_SECRET }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: |
          cd src
          # スケジュール起動 or 手動でpost指定 → 実投稿。手動のimage等は画像のみ。
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ github.event.inputs.action }}" = "post" ]; then
            python narrative_bot/narrative_post.py post
          else
            python narrative_bot/narrative_post.py
          fi
```

これが現在の `narrative.yml` の全文です。3つの自動実行（夏時間基準・平日）＋手動実行、スケジュール起動時は自動で実投稿、という構成になっています。
